# Server
server.port=8080

# Application name
spring.application.name=user-api

# H2 In-memory database (great for dev/testing, swap for MySQL/PostgreSQL in prod)
spring.datasource.url=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (useful for local debugging at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator — expose built-in health endpoint at /actuator/health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always